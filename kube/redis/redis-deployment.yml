---
apiVersion: apps/v1
kind: Deployment
metadata:
  {{ if eq .KUBE_NAMESPACE .BRANCH_ENV }}
  name: redis-{{ .DRONE_SOURCE_BRANCH }}
  {{ else }}
  name: redis
  {{ end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{ if eq .KUBE_NAMESPACE .BRANCH_ENV }}
      app: redis-{{ .DRONE_SOURCE_BRANCH }}
      {{ else }}
      app: redis
      {{ end }}
  template:
    metadata:
      labels:
        {{ if eq .KUBE_NAMESPACE .BRANCH_ENV }}
        name: redis-{{ .DRONE_SOURCE_BRANCH }}
        service: redis-{{ .DRONE_SOURCE_BRANCH }}
        app: redis-{{ .DRONE_SOURCE_BRANCH }}
        {{ else }}
        name: redis
        service: redis
        app: redis
        {{ end }}
    spec:
      securityContext:
        fsGroup: 994
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: redis
          # redis:v5.0.6-1
          imagePullPolicy: IfNotPresent
          image: quay.io/ukhomeofficedigital/redis@sha256:4499ea7306de776dab2ba8befd723a419fd311519d6f91f7821ed1a7c589da3b
          ports:
            - containerPort: 6379
          volumeMounts:
            - mountPath: /var/lib/redis
              name: data
          securityContext:
            runAsNonRoot: true
          resources:
          {{ if eq .KUBE_NAMESPACE .PROD_ENV }}
            requests:
              cpu: "400m"
              memory: "2000Mi"
            limits:
              cpu: "1000m"
              memory: "2000Mi"
          {{ else }}
            requests:
              cpu: "20m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "200Mi"
          {{ end }}
      volumes:
        {{ if and (eq .REDIS_PERSISTENCE_ENABLED "true") (ne .REDIS_PERSISTENCE_EXISTING_CLAIM "") }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .REDIS_PERSISTENCE_EXISTING_CLAIM }}
        {{ else if eq .REDIS_PERSISTENCE_ENABLED "true" }}
        - name: data
          persistentVolumeClaim:
            {{ if eq .KUBE_NAMESPACE .BRANCH_ENV }}
            claimName: redis-pvc-{{ .DRONE_SOURCE_BRANCH }}
            {{ else }}
            claimName: redis-pvc
            {{ end }}
        {{ else }}
        - name: data
          emptyDir: {}
        {{ end }}
